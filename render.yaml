services:
  - type: web
    name: anime-bot
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && playwright install chromium
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: BOT_USERNAME
        sync: false
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: MONGO_URI
        sync: false
      - key: DB_NAME
        value: animebot
      - key: WEBHOOK_URL
        sync: false
      - key: PORT
        value: "10000"
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "/opt/render/project/.playwright"
